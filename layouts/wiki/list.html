{{ define "main" }}
<div class="wiki">
  <div class="wiki-header">
    <h1 class="wiki-header-title">{{ .Title }}</h1>
    <div class="wiki-header-line"></div>
  </div>

  {{ range .Pages.ByTitle }}
    {{ if and (ne .Title "Wiki Template") (ne .Params.archived true) }}
      <div>
        <a class="wiki-post" href="{{ .RelPermalink }}">
          <div style="overflow: hidden; text-overflow: ellipsis;">
            <span class="wiki-post-title">{{ .Title }}</span>
            <div class="wiki-post-line"></div>
          </div>
        </a>
      </div>
    {{ end }}
  {{ end }}

  <div class="catalogue-line" style="margin:30px"></div>

  {{ range .Pages.ByTitle }}
    {{ if .Params.archived }}
      <div>
        <a class="wiki-post" href="{{ .RelPermalink }}">
          <div style="overflow: hidden; text-overflow: ellipsis;">
            <span class="wiki-post-title-archived">{{ .Title }}</span>
            <div class="wiki-post-line"></div>
          </div>
        </a>
      </div>
    {{ end }}
  {{ end }}
</div>
{{ end }}
