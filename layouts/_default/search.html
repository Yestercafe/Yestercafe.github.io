{{ define "main" }}
<style>
  code { font-size: 1.5rem; }
</style>
<div class="search">
  <div class="search-header">
    <h1 class="search-header-title">搜索</h1>
    <div class="search-header-line"></div>
  </div>
</div>
<div class="search-panel">
  <div class="search-input-wrap">
    <input type="text" id="search-input" class="search-input" placeholder="输入搜索内容…" autocomplete="off" aria-label="搜索文章">
  </div>
  <div id="results-container" class="search-results"></div>
</div>
<script src="{{ "assets/js/simple-jekyll-search.min.js" | relURL }}"></script>
<script>
  window.simpleJekyllSearch = new SimpleJekyllSearch({
    searchInput: document.getElementById('search-input'),
    resultsContainer: document.getElementById('results-container'),
    json: '{{ "search.json" | relURL }}',
    searchResultTemplate: '<div><a class="search-item" href="{url}?query={query}"><div style="overflow:hidden;text-overflow:ellipsis"><span class="search-item-title">{title}</span><div class="search-item-line"></div></div></a></div>',
    noResultsText: '<h2>无结果</h3><br><br><br><br><code>No code no life.</code>',
    limit: 12,
    fuzzy: true,
  })
</script>
{{ end }}
