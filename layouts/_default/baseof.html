<!DOCTYPE html>
<html lang="zh-cn">
<head>
  {{ partial "head.html" . }}
</head>
<body>
  {{ partial "nav.html" . }}
  <main>
    {{ block "main" . }}{{ end }}
  </main>
  {{ partial "widgets.html" . }}
  {{ partial "footer.html" . }}
</body>
<script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
<script type="text/javascript" id="MathJax-script" async
  src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js"></script>
<script>
MathJax = {
  tex: {
    inlineMath: [['$', '$'], ['\\(', '\\)']]
  }
};
</script>
<script>
function initSakanaWidget() {
  if (typeof SakanaWidget !== 'undefined') {
    SakanaWidget({ character: 'takina' });
  }
}
</script>
<script async onload="initSakanaWidget()"
  src="https://cdn.jsdelivr.net/npm/sakana-widget@1.2.0/lib/sakana.min.js"></script>
<script src="https://code.jquery.com/jquery-3.6.0.slim.min.js" integrity="sha256-u7e5khyithlIdTpu22PHhENmPcRdFiHRjhAuHcs05RI=" crossorigin="anonymous"></script>
<script>
$(function () {
  $('img').on('click', function () {
    window.open($(this).attr('src'));
  });
});
</script>
<script type="text/javascript" color="232,122,144" opacity="0.6" src="https://cdn.jsdelivr.net/npm/canvas-nest.js@1.0.1/lib/canvas-nest.min.js"></script>
</html>
